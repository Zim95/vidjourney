[scenes]
scenes_dir = pipeline/scenes
default_scene_file = dsl_instructions.scene
dsl_grammar_file = src/dsl/renderer_dsl.lark

[render]
render_dir = pipeline/render
default_render_file = dsl_instructions.render.json
max_workers = 4

[manim]
python = .venv/bin/python
scene_file = src/renderer/manim/manim_runner.py
scene_class = ManimScene
quality = ql
preview = true
max_workers = 4

[ingestion]
max_workers = 4
# Table detection thresholds for per-document tuning
table_y_tolerance = 3.0
table_x_cluster_tolerance = 8.0
table_row_spacing_variance = 2.5
table_width_ratio = 0.75
table_score_threshold = 3.0

# Code detection thresholds for per-document tuning
code_sql_keyword_hits = 4
code_symbol_density_min = 0.015
code_symbol_density_strong = 0.03
code_min_line_count = 3
code_demote_symbol_density = 0.02
code_demote_sql_hits = 2
code_prose_min_line_length = 8
code_prose_connector_keywords = which,because,therefore,works,calculate,efficiently,load,find
